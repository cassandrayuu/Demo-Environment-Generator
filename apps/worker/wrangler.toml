name = "pb-demo-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pb-demo-db"
database_id = "2997cb61-1b12-427a-ad97-9360c66ac6c6"

# Environment variables (set via wrangler secret)
# RUNNER_URL - URL of the Python runner service
# RUNNER_SECRET - Shared secret for runner authentication
# CF_ACCESS_TEAM_DOMAIN - Cloudflare Access team domain (e.g., "yourteam.cloudflareaccess.com")
# REQUIRE_CLOUDFLARE_ACCESS - Set to "false" to disable CF Access JWT verification (MVP mode)

[vars]
ENVIRONMENT = "production"
# Set to "false" for temporary/MVP deployments without Cloudflare Access
REQUIRE_CLOUDFLARE_ACCESS = "false"
# Main Runner URL (Railway) - for demo generator and insights
RUNNER_URL = "https://demo-environment-generator-production.up.railway.app"
# Spark Context Runner URL (Railway)
SPARK_RUNNER_URL = "https://spark-context-runner-production.up.railway.app"

# Local development
[env.dev]
name = "pb-demo-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
