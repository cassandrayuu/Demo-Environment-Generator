name = "pb-demo-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pb-demo-db"
database_id = "YOUR_DATABASE_ID"  # Replace after creating with: wrangler d1 create pb-demo-db

# Environment variables (set via wrangler secret)
# RUNNER_URL - URL of the Python runner service
# RUNNER_SECRET - Shared secret for runner authentication
# CF_ACCESS_TEAM_DOMAIN - Cloudflare Access team domain (e.g., "yourteam.cloudflareaccess.com")

[vars]
ENVIRONMENT = "production"

# Local development
[env.dev]
name = "pb-demo-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
